<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#071a30" />
    <title>Rotary Minutes</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #071a30 0%, #0d2d52 55%, #071a30 100%);
        color: #fff;
        font-family: Inter, system-ui, sans-serif;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      .loader {
        text-align: center;
        padding: 2rem;
        animation: fade-in 0.4s ease;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        margin: 0 auto 1.25rem;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        object-fit: cover;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(245, 166, 35, 0.2);
        border-top-color: #f5a623;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 1rem;
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p {
        margin-top: 0.35rem;
        font-size: 0.8125rem;
        color: rgba(255, 255, 255, 0.55);
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <img class="logo" src="/logo.png" alt="" width="72" height="72" />
      <div class="spinner" aria-hidden="true"></div>
      <h1>Rotary Minutes</h1>
      <p>Chargement…</p>
    </div>
    <script>
      // Redirect only when Capacitor server.url is not configured (static preview).
      if (!window.Capacitor) {
        var locale = (navigator.language || "fr").slice(0, 2);
        if (!["fr", "en", "es"].includes(locale)) locale = "fr";
        window.location.replace("/" + locale + "/dashboard");
      }
    </script>
  </body>
</html>
