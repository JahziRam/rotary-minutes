<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d2d52" />
    <title>Rotary Minutes</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #071a30;
        color: #fff;
        font-family: Inter, Arial, sans-serif;
      }
      .card {
        text-align: center;
        padding: 2rem;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(245, 166, 35, 0.25);
        border-top-color: #f5a623;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" aria-hidden="true"></div>
      <p>Chargement de Rotary Minutes…</p>
    </div>
    <script>
      // Fallback when Capacitor server.url is not configured.
      window.location.replace("/fr/dashboard");
    </script>
  </body>
</html>
