# Render Blueprint — déploiement gratuit pour candidature Startup
# Dashboard → Blueprint → Sync (injecte DATABASE_URL depuis la DB Render)
databases:
  - name: rotary-minutes-db
    plan: free
    region: oregon
    databaseName: rotary_minutes
    user: rotary_minutes

services:
  - type: web
    name: rotary-minutes
    runtime: node
    region: oregon
    plan: free
    buildCommand: bash scripts/render-build.sh
    buildFilter:
      paths:
        - src/**
        - prisma/**
        - public/**
        - package.json
        - package-lock.json
        - next.config.ts
        - scripts/render-build.sh
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        value: https://clubminutes.api.mg
      - key: AUTH_URL
        value: https://clubminutes.api.mg
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NEXT_PUBLIC_APP_URL
        value: https://clubminutes.api.mg
      - key: NEXT_PUBLIC_APP_NAME
        value: Rotary Minutes
      - key: DATABASE_URL
        fromDatabase:
          name: rotary-minutes-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: rotary-minutes-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: REFERRAL_REWARD_DAYS
        value: "30"
      - key: RUN_DB_SEED
        value: "1"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"
      - key: XAI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_BASE_URL
        sync: false
      - key: OPENAI_MINUTE_AI_MODEL
        sync: false
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: QWEN_API_BASE_URL
        sync: false