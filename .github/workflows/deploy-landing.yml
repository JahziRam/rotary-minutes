name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "landing-worker/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

jobs:
  deploy-pages:
    name: Cloudflare Pages (Atlas)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g wrangler@4

      - name: Deploy landing to Pages
        run: npx wrangler pages deploy landing --project-name=rotary-minutes-landing --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-custom-domain:
    name: clubminutes.api.mg (legacy zone)
    runs-on: ubuntu-latest
    needs: deploy-pages
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g wrangler@4

      - name: Deploy landing worker on legacy account
        working-directory: landing-worker
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::Skipping clubminutes.api.mg — add CLOUDFLARE_LEGACY_API_TOKEN to GitHub secrets."
            echo "::warning::Zone api.mg is on account e3b91a2e610a05f7043060f477933d4d (personal), not Atlas."
            exit 0
          fi
          npx wrangler deploy --config wrangler.production.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_LEGACY_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e3b91a2e610a05f7043060f477933d4d