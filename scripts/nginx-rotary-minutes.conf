# Exemple Nginx — /etc/nginx/sites-available/rotary-minutes
# sudo ln -s /etc/nginx/sites-available/rotary-minutes /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# sudo certbot --nginx -d rotaryminutes.app -d www.rotaryminutes.app

server {
    listen 80;
    server_name rotaryminutes.app www.rotaryminutes.app;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}